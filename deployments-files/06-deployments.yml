# ============================================================
# Deployments — all pdf-labs microservices
# ============================================================
# Images: replace each "REGISTRY/IMAGE:TAG" with your actual
#         image references (e.g. from a private registry or
#         Docker Hub).  Add an imagePullSecret if needed.
#
# Health endpoints: each service should expose /health.
#   If yours use a different path, adjust httpGet.path below.
# ============================================================

# ────────────────────────────────────────────────────────────
# 1. account-service  (port 3000 — landing page / auth)
# ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: pdf-labs
  labels:
    app.kubernetes.io/name: pdf-labs
    app.kubernetes.io/component: account-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: account-service
        app.kubernetes.io/component: account-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: account-service
          image: ghcr.io/godfrey22152/microservice-pdf-labs/pdf-labs-deployment-account-service:fc9df2a6bd587ff85f922dd1c5aa4396453fc9dd        # ← replace
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: pdf-labs-config
                  key: NODE_ENV
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: pdf-labs-config
                  key: MONGO_URI_ACCOUNT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pdf-labs-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24     # 24 × 5s = 2 min max startup
            successThreshold: 1
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

---
