# ============================================================
# MongoDB 4.4  —  StatefulSet + Headless Service + Init Job
# ============================================================
# DNS pattern for each pod:
#   mongo-pdf-labs-<N>.mongo-pdf-labs.pdf-labs.svc.cluster.local
#
# Apply with:
#   kubectl apply -f 04-mongo-statefulset.yml
#
# The Job waits for all 3 pods, initiates the replica set,
# creates all application databases and collections, then
# auto-deletes itself after 5 minutes.
# ============================================================

# ── 1. Headless Service ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mongo-pdf-labs
  namespace: pdf-labs
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: pdf-labs
    app.kubernetes.io/component: mongo
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: mongo-pdf-labs
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017

---
# ── 2. StatefulSet ───────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-pdf-labs
  namespace: pdf-labs
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: pdf-labs
    app.kubernetes.io/component: mongo
spec:
  serviceName: "mongo-pdf-labs"
  replicas: 3
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: mongo-pdf-labs
  template:
    metadata:
      labels:
        app: mongo-pdf-labs
        app.kubernetes.io/component: mongo
    spec:
      terminationGracePeriodSeconds: 60

      initContainers:
        - name: wait-for-dns
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              POD_NAME=$(hostname)
              until nslookup ${POD_NAME}.mongo-pdf-labs.pdf-labs.svc.cluster.local; do
                echo "Waiting for ${POD_NAME} headless DNS..."; sleep 2;
              done
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

      containers:
        - name: mongo
          image: mongo:4.4
          imagePullPolicy: IfNotPresent
          command:
            - mongod
            - --config=/etc/mongo/mongodb.conf
          ports:
            - name: mongo
              containerPort: 27017

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-config
              mountPath: /etc/mongo
              readOnly: true

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # startupProbe: guards liveness/readiness until mongod is up
          startupProbe:
            exec:
              command:
                - mongo
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5

          # livenessProbe: restarts pod if mongod stops responding
          livenessProbe:
            exec:
              command:
                - mongo
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          # readinessProbe: simple ping so pods become Ready without
          # needing rs.initiate() first — breaks the OrderedReady deadlock
          readinessProbe:
            exec:
              command:
                - mongo
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

      volumes:
        - name: mongo-config
          configMap:
            name: mongo-init-config
            items:
              - key: mongodb.conf
                path: mongodb.conf

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
        labels:
          app: mongo-pdf-labs
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: openebs-hostpath
        resources:
          requests:
            storage: 5Gi

---
# ── 3. Replica-Set Init Job ──────────────────────────────────
# Runs once all 3 pods are Ready and accepting connections.
# Initiates rs0, waits for PRIMARY election, then creates all
# application databases and collections.
# Idempotent — safe to re-apply.
# Auto-deletes 2 minutes after completion.
# ============================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-replicaset-init
  namespace: pdf-labs
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: pdf-labs
    app.kubernetes.io/component: mongo-init
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 120
  template:
    metadata:
      labels:
        app: mongo-replicaset-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-init
          image: mongo:4.4
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              PRIMARY="mongo-pdf-labs-0.mongo-pdf-labs.pdf-labs.svc.cluster.local"
              MEMBER1="mongo-pdf-labs-1.mongo-pdf-labs.pdf-labs.svc.cluster.local"
              MEMBER2="mongo-pdf-labs-2.mongo-pdf-labs.pdf-labs.svc.cluster.local"
              MAX=90

              echo "=== Waiting for all MongoDB pods to accept connections ==="

              wait_for_mongo() {
                local host="$1"
                local attempt=0
                until mongo --host "$host" --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q "1"; do
                  attempt=$((attempt + 1))
                  [ "$attempt" -ge "$MAX" ] && { echo "ERROR: timed out waiting for $host"; exit 1; }
                  echo "  [$attempt/$MAX] Waiting for $host ..."
                  sleep 10
                done
                echo "  $host is up."
              }

              wait_for_mongo "$PRIMARY"
              wait_for_mongo "$MEMBER1"
              wait_for_mongo "$MEMBER2"

              echo "=== Checking replica-set status ==="
              RS_STATUS=$(mongo --host "$PRIMARY" --quiet --eval "
                try { JSON.stringify(rs.status()); }
                catch(e) { JSON.stringify({ok:0, codeName: e.codeName}); }
              " 2>/dev/null || echo '{"ok":0}')

              echo "rs.status() output: $RS_STATUS"

              if echo "$RS_STATUS" | grep -qE '"ok"\s*:\s*1'; then
                echo "Replica set already initialised — skipping rs.initiate()."
              else
                echo "=== Initialising replica set rs0 ==="
                mongo --host "$PRIMARY" --quiet --eval "
                  rs.initiate({
                    _id: 'rs0',
                    members: [
                      { _id: 0, host: '${PRIMARY}:27017', priority: 2 },
                      { _id: 1, host: '${MEMBER1}:27017', priority: 1 },
                      { _id: 2, host: '${MEMBER2}:27017', priority: 1 }
                    ]
                  });
                "
                echo "rs.initiate() sent."
              fi

              echo "=== Waiting for PRIMARY election ==="
              attempt=0
              until mongo --host "$PRIMARY" --quiet --eval "db.isMaster().ismaster" 2>/dev/null | grep -q "true"; do
                attempt=$((attempt + 1))
                [ "$attempt" -ge "$MAX" ] && { echo "ERROR: timed out waiting for PRIMARY"; exit 1; }
                echo "  [$attempt/$MAX] No primary yet, waiting ..."
                sleep 10
              done
              echo "Primary elected on $PRIMARY."

              echo "=== Creating application databases and collections ==="
              mongo --host "$PRIMARY" --quiet --eval "
                var dbs = [
                  { name: 'account-service',       col: 'accounts'     },
                  { name: 'tools-service',          col: 'tools'        },
                  { name: 'pdf-to-image-service',   col: 'conversions'  },
                  { name: 'image-to-pdf-service',   col: 'conversions'  },
                  { name: 'pdf-to-audio-service',   col: 'conversions'  },
                  { name: 'pdf-compressor-service', col: 'compressions' },
                  { name: 'pdf-to-word-service',    col: 'conversions'  },
                  { name: 'word-to-pdf-service',    col: 'conversions'  },
                  { name: 'edit-pdf-service',       col: 'edits'        },
                  { name: 'sheetlab-service',       col: 'sheets'       }
                ];
                dbs.forEach(function(d) {
                  var db2 = db.getSiblingDB(d.name);
                  db2.createCollection(d.col);
                  print('Created: ' + d.name + '.' + d.col);
                });
                print('All databases and collections ready.');
              "

              echo "=== MongoDB initialisation complete ==="
