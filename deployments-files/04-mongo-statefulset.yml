# ============================================================
# MongoDB 7.0  —  StatefulSet + Headless Service
# ============================================================
# DNS pattern for each pod:
#   mongo-pdf-labs-<N>.mongo-pdf-labs.pdf-labs.svc.cluster.local
# ============================================================

# ── 1. Headless Service (required for StatefulSet stable DNS) ──
apiVersion: v1
kind: Service
metadata:
  name: mongo-pdf-labs
  namespace: pdf-labs
  labels:
    app.kubernetes.io/name: pdf-labs
    app.kubernetes.io/component: mongo
spec:
  clusterIP: None          # headless
  publishNotReadyAddresses: true   # needed during replica-set init
  selector:
    app: mongo-pdf-labs
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017

---
# ── 2. StatefulSet ──────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-pdf-labs
  namespace: pdf-labs
  labels:
    app.kubernetes.io/name: pdf-labs
    app.kubernetes.io/component: mongo
spec:
  serviceName: "mongo-pdf-labs"     # must match headless Service name
  replicas: 3
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: mongo-pdf-labs
  template:
    metadata:
      labels:
        app: mongo-pdf-labs
        app.kubernetes.io/component: mongo
    spec:
      # ── Pod-level settings ─────────────────────────────────
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999          # mongodb group so volume is writable
        runAsUser: 999
        runAsGroup: 999

      # ── Init container — wait for peer DNS to resolve ──────
      initContainers:
        - name: wait-for-dns
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nslookup mongo-pdf-labs-0.mongo-pdf-labs.pdf-labs.svc.cluster.local; do
                echo "Waiting for mongo-pdf-labs headless DNS..."; sleep 2;
              done
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

      containers:
        - name: mongo
          image: mongo:7.0.31-jammy  # Verified Publisher with small image size  
          imagePullPolicy: IfNotPresent
          command:
            - mongod
            - --config=/etc/mongo/mongodb.conf
          ports:
            - name: mongo
              containerPort: 27017

          # ── Environment ──────────────────────────────────────
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          # ── Volume mounts ────────────────────────────────────
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-config
              mountPath: /etc/mongo
              readOnly: true

          # ── Resource limits ──────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # ── startupProbe ─────────────────────────────────────
          # Allows up to 5 min (30 × 10s) for initial startup
          # before liveness/readiness take over.
          startupProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
            successThreshold: 1
            timeoutSeconds: 5

          # ── livenessProbe ────────────────────────────────────
          # Restarts the container if mongod stops responding.
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          # ── readinessProbe ───────────────────────────────────
          # Removes pod from service endpoints when not ready.
          # Checks that the replica set member is either PRIMARY
          # or SECONDARY (state codes 1 and 2).
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - |
                  var state = rs.status().myState;
                  if (state === 1 || state === 2) { quit(0); } else { quit(1); }
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 10

      # ── Volumes (config only; data via volumeClaimTemplates) ─
      volumes:
        - name: mongo-config
          configMap:
            name: mongo-init-config
            items:
              - key: mongodb.conf
                path: mongodb.conf

  # ── PVC template (one PVC per pod, per node) ──────────────
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
        labels:
          app: mongo-pdf-labs
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: openebs-hostpath
        resources:
          requests:
            storage: 5Gi
