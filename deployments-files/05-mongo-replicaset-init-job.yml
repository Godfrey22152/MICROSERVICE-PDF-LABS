# ============================================================
# Job — MongoDB Replica-Set Initialisation
# ============================================================
# Run ONCE after all 3 mongo-pdf-labs pods are Running.
# Checks whether rs0 is already initialised before acting,
# so it is safe to re-apply (idempotent).
#
# Apply order:
#   1. 04-mongo-statefulset.yaml  (wait for 3/3 pods Ready)
#   2. kubectl apply -f 05-mongo-replicaset-init-job.yaml
# ============================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-replicaset-init
  namespace: pdf-labs
  labels:
    app.kubernetes.io/name: pdf-labs
    app.kubernetes.io/component: mongo-init
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300    # auto-clean job 5 min after completion
  template:
    metadata:
      labels:
        app: mongo-replicaset-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-init
          image: rapidfort/mongodb-official:latest
          imagePullPolicy: IfNotPresent

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              PRIMARY="mongo-pdf-labs-0.mongo-pdf-labs.pdf-labs.svc.cluster.local"
              MEMBER1="mongo-pdf-labs-1.mongo-pdf-labs.pdf-labs.svc.cluster.local"
              MEMBER2="mongo-pdf-labs-2.mongo-pdf-labs.pdf-labs.svc.cluster.local"
              MAX=90   # max attempts per check (90 × 10s = 15 min total)

              echo "=== Waiting for all MongoDB pods to accept connections ==="

              wait_for_mongo() {
                local host="$1"
                local attempt=0
                until mongosh --host "$host" --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q "1"; do
                  attempt=$((attempt + 1))
                  if [ "$attempt" -ge "$MAX" ]; then
                    echo "ERROR: timed out waiting for $host"; exit 1
                  fi
                  echo "  [$attempt/$MAX] Waiting for $host ..."
                  sleep 10
                done
                echo "  $host is up."
              }

              wait_for_mongo "$PRIMARY"
              wait_for_mongo "$MEMBER1"
              wait_for_mongo "$MEMBER2"

              echo "=== Checking replica-set status ==="
              RS_STATUS=$(mongosh --host "$PRIMARY" --quiet --eval "
                try { JSON.stringify(rs.status()); }
                catch(e) { JSON.stringify({ok:0, codeName: e.codeName}); }
              " 2>/dev/null || echo '{"ok":0}')

              echo "rs.status() output: $RS_STATUS"

              if echo "$RS_STATUS" | grep -qE '"ok"\s*:\s*1'; then
                echo "Replica set already initialised — skipping rs.initiate()."
              else
                echo "=== Initialising replica set rs0 ==="
                mongosh --host "$PRIMARY" --quiet --eval "
                  rs.initiate({
                    _id: 'rs0',
                    members: [
                      { _id: 0, host: '${PRIMARY}:27017', priority: 2 },
                      { _id: 1, host: '${MEMBER1}:27017', priority: 1 },
                      { _id: 2, host: '${MEMBER2}:27017', priority: 1 }
                    ]
                  });
                "
                echo "rs.initiate() sent."
              fi

              echo "=== Waiting for PRIMARY election ==="
              attempt=0
              until mongosh --host "$PRIMARY" --quiet --eval "db.isMaster().ismaster" 2>/dev/null | grep -q "true"; do
                attempt=$((attempt + 1))
                if [ "$attempt" -ge "$MAX" ]; then
                  echo "ERROR: timed out waiting for PRIMARY election"; exit 1
                fi
                echo "  [$attempt/$MAX] No primary yet, waiting ..."
                sleep 10
              done
              echo "Primary elected on $PRIMARY."

              echo "=== Ensuring application databases and collections exist ==="
              mongosh --host "$PRIMARY" --quiet --eval "
                // account-service (shared by home, profile, logout)
                db = db.getSiblingDB('account-service');
                db.createCollection('accounts');

                // tools-service
                db = db.getSiblingDB('tools-service');
                db.createCollection('tools');

                // pdf-to-image-service
                db = db.getSiblingDB('pdf-to-image-service');
                db.createCollection('conversions');

                // image-to-pdf-service
                db = db.getSiblingDB('image-to-pdf-service');
                db.createCollection('conversions');

                // pdf-to-audio-service
                db = db.getSiblingDB('pdf-to-audio-service');
                db.createCollection('conversions');

                // pdf-compressor-service
                db = db.getSiblingDB('pdf-compressor-service');
                db.createCollection('compressions');

                // pdf-to-word-service
                db = db.getSiblingDB('pdf-to-word-service');
                db.createCollection('conversions');

                // word-to-pdf-service
                db = db.getSiblingDB('word-to-pdf-service');
                db.createCollection('conversions');

                // edit-pdf-service
                db = db.getSiblingDB('edit-pdf-service');
                db.createCollection('edits');

                // sheetlab-service
                db = db.getSiblingDB('sheetlab-service');
                db.createCollection('sheets');

                print('All databases and collections created.');
              "

              echo "=== MongoDB initialisation complete ==="
