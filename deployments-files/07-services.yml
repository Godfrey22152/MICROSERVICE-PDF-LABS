# ============================================================
# Services
# ============================================================
# account-service → LoadBalancer (external entry point)
# All other services → ClusterIP (internal only)
# ============================================================

# ── account-service (LoadBalancer — external landing page) ──
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: pdf-labs
  labels:
    app.kubernetes.io/name: pdf-labs
    app.kubernetes.io/component: account-service
  annotations:
    # Uncomment if your load-balancer supports session affinity
    # service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "60"
spec:
  type: LoadBalancer
  selector:
    app: account-service
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP

---
