# ============================================================
# Services
# ============================================================
# account-service  → LoadBalancer (external entry point)
# mongo-express    → LoadBalancer (admin GUI)
# All other services → ClusterIP (internal only)
# ============================================================

# ── account-service (LoadBalancer — external landing page) ──
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: pdf-labs
  annotations: 
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: pdf-labs
    app.kubernetes.io/component: account-service
spec:
  type: LoadBalancer
  selector:
    app: account-service
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP

---
