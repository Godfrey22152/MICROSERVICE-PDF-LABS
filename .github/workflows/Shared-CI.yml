name: Shared CI

on:
  workflow_call:

jobs:
  # ── Syntax Check ──────────────────────────────────────────────────────
  compile:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          for file in $(find . -name "*.js" -not -path "*/node_modules/*"); do
            echo "Checking $file"
            node --check "$file"
          done
          
  # ── Dependency Audit ───────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --json > npm-audit-report.json || true
      
      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 7
      
      # Fails the build if any high or critical vulnerabilities are found in the declared dependencies
      - name: Fail on high/critical vulnerabilities
        run: |
          npm audit --audit-level=high
          
  # ── Secret Scanning ───────────────────────────────────────────────────
  gitleaks-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: dependency-audit
    steps: 
    
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: GitLeaks Setup
        uses: gitleaks/gitleaks-action@v2

      - name: Run GitLeaks Scan 
        run: gitleaks detect --source . --report-format json --report-path gitleaks-report.json || true
      
      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 7
      
      # Fail separately
      - name: Fail on leaks
        run: gitleaks detect --source . --exit-code 1

  # ── Dockerfile Lint ───────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning   # Fails on any warning or error level finding
          format: json
          output-file: hadolint-report.json
          no-color: false

      - name: Upload Hadolint Report
        uses: actions/upload-artifact@v4
        with:
          name: hadolint-report
          path: hadolint-report.json
          retention-days: 7
        
  # ── Filesystem Vulnerability Scan ────────────────────────────────────
  trivy-fs-scan:
    runs-on: ubuntu-latest
    needs: dockerfile-lint
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Generate Trivy Vulnerability Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          output: trivy-report.json
          format: json
          scan-ref: .
          exit-code: 0
      
      - name: Upload Vulnerability Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7

      - name: Fail build on High/Criticial Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          format: table
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          # On a subsequent call to the action we know trivy is already installed so can skip this
          skip-setup-trivy: true

  # ── OWASP Dependency Check ────────────────────────────────────────────
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: trivy-fs-scan
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "PDF-Labs"
          path: "."
          out: "owasp-report"
          format: 'HTML'
          args: >
            --format HTML 
            --format JSON
            --enableRetired
            --failOnCVSS 7
            --exclude "**/node_modules/**"  
        # Fails if any dependency has a CVSS score of 7 or higher (high/critical)
        # Cross-references the NVD database directly — more thorough than npm audit
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: owasp-report/
          retention-days: 7

  # ── SonarQube Static Analysis ────────────────────────────────────────
  #Sonarqube-scans:
    #name: SonarQube Static Analysis
    #runs-on: self-hosted-runner
    #needs: owasp-dependency-check
    #steps:
      #- name: Check out Git repository
        #uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        #with:
          #fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      
      #- name: SonarQube Scan
        #uses: SonarSource/sonarqube-scan-action@master
        #with:
          #args: >
            #-Dsonar.projectKey=PDF-Labs-Project-key
            #-Dsonar.projectName=PDF-Labs-Project
            #-Dsonar.sources=.
            #-Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.github/**,**/.gitignore,**/.dockerignore
        #env:
          #SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          #SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Docker Image Build ────────────────────────────────────────────────
  docker-build-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    needs: owasp-dependency-check

    permissions:
      contents: read
      packages: write   # required for GHCR push
  
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/$OWNER/$REPO/pdf-labs-deployment-$BRANCH:${{ github.sha }}" >> $GITHUB_ENV
  
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
  
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

  # ── Docker Image Vulnerability Scan ──────────────────────────────────
  trivy-image-scan:
    name: Docker Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/$OWNER/$REPO/pdf-labs-deployment-$BRANCH:${{ github.sha }}" >> $GITHUB_ENV

      - name: Generate Image Scan Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Upload Image Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 7

      - name: Fail on High/Critical Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          skip-setup-trivy: true
          
  # ── Allure Security Report ────────────────────────────────────────────
  allure-report:
    name: Generate Allure Security Report
    runs-on: ubuntu-latest
    needs: trivy-image-scan
    if: always()

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Download npm audit report
        uses: actions/download-artifact@v4
        with:
          name: npm-audit-report
          path: raw-reports/npm-audit
        continue-on-error: true

      - name: Download Gitleaks report
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
          path: raw-reports/gitleaks
        continue-on-error: true

      - name: Download Hadolint Report
        uses: actions/download-artifact@v4
        with:
          name: hadolint-report
          path: raw-reports/hadolint
        continue-on-error: true

      - name: Download Trivy FS Report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: raw-reports/trivy-fs
        continue-on-error: true

      - name: Download OWASP Report
        uses: actions/download-artifact@v4
        with:
          name: owasp-dependency-report
          path: raw-reports/owasp
        continue-on-error: true

      - name: Download Trivy Image Report
        uses: actions/download-artifact@v4
        with:
          name: trivy-image-report
          path: raw-reports/trivy-image
        continue-on-error: true

      - name: Convert Reports to Allure Results
        run: |
          mkdir -p allure-results

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          cat > allure-results/environment.properties <<EOF
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Repository=${{ github.repository }}
          Workflow=${{ github.workflow }}
          Run_Number=${{ github.run_number }}
          Actor=${{ github.actor }}
          EOF

          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "${{ github.ref_name }} #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.ref_name }}/",
            "reportName": "Security Report - ${{ github.ref_name }} - ${{ github.sha }}"
          }
          EOF

          # ── NPM Audit ──────────────────────────────────────────────────
          NPM_FILE="raw-reports/npm-audit/npm-audit-report.json"
          if [ -f "$NPM_FILE" ] && [ -s "$NPM_FILE" ]; then
            VULN_COUNT=$(jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical' "$NPM_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              STATUS="passed"
              DETAIL="No high or critical vulnerabilities found in npm dependencies."
            else
              STATUS="failed"
              DETAIL=$(jq -r '.advisories? // {} | to_entries[] | "[\(.value.severity | ascii_upcase)] \(.value.module_name) → \(.value.title)"' "$NPM_FILE" 2>/dev/null | head -20)
            fi
          else
            STATUS="skipped"; DETAIL="npm audit report not available."
          fi
          cat > allure-results/npm-audit-result.json <<EOF
          {
            "name": "Dependency Audit (npm audit)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "npm audit scan for known vulnerabilities in project dependencies.",
            "steps": [{ "name": "High/Critical Vulnerabilities", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "Dependency Audit" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Gitleaks ───────────────────────────────────────────────────
          GITLEAKS_FILE="raw-reports/gitleaks/gitleaks-report.json"
          if [ -f "$GITLEAKS_FILE" ] && [ -s "$GITLEAKS_FILE" ]; then
            COUNT=$(jq 'length' "$GITLEAKS_FILE" 2>/dev/null || echo 0)
            if [ "$COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No secrets detected."
            else
              STATUS="failed"
              DETAIL=$(jq -r '.[] | "[\(.RuleID)] \(.Description) in \(.File):\(.StartLine)"' "$GITLEAKS_FILE" | head -20)
            fi
          else
            STATUS="skipped"; DETAIL="Gitleaks report not available."
          fi
          cat > allure-results/gitleaks-result.json <<EOF
          {
            "name": "Secret Scanning (Gitleaks)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Scan for hardcoded secrets and credentials in the repository.",
            "steps": [{ "name": "Detected Secrets", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "Secret Scanning" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Hadolint ───────────────────────────────────────────────────
          HADOLINT_FILE="raw-reports/hadolint/hadolint-report.json"
          if [ -f "$HADOLINT_FILE" ] && [ -s "$HADOLINT_FILE" ]; then
            COUNT=$(jq 'length' "$HADOLINT_FILE")
            if [ "$COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No Dockerfile issues found."
            else
              STATUS="failed"
              DETAIL=$(jq -r '[.[] | "[\(.level | ascii_upcase)] \(.code): \(.message) (line \(.line))"] | join("\n")' "$HADOLINT_FILE")
            fi
          else
            STATUS="skipped"; DETAIL="Hadolint report not available."
          fi
          cat > allure-results/hadolint-result.json <<EOF
          {
            "name": "Dockerfile Lint (Hadolint)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Hadolint static analysis of the project Dockerfile.",
            "steps": [{ "name": "Hadolint Findings", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "Dockerfile Lint" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Trivy FS ───────────────────────────────────────────────────
          TRIVY_FS_FILE="raw-reports/trivy-fs/trivy-report.json"
          if [ -f "$TRIVY_FS_FILE" ] && [ -s "$TRIVY_FS_FILE" ]; then
            VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' "$TRIVY_FS_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No HIGH/CRITICAL filesystem vulnerabilities found."
            else
              STATUS="failed"
              DETAIL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL") | "[\(.Severity)] \(.VulnerabilityID) in \(.PkgName) \(.InstalledVersion) → \(.Title // "N/A")"] | unique | join("\n")' "$TRIVY_FS_FILE")
            fi
          else
            STATUS="skipped"; DETAIL="Trivy FS report not available."
          fi
          cat > allure-results/trivy-fs-result.json <<EOF
          {
            "name": "Filesystem Vulnerability Scan (Trivy)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Trivy scan of the repository filesystem for HIGH and CRITICAL CVEs.",
            "steps": [{ "name": "HIGH/CRITICAL CVEs Found", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "Filesystem Vulnerability Scan" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Trivy Image ────────────────────────────────────────────────
          TRIVY_IMG_FILE="raw-reports/trivy-image/trivy-image-report.json"
          if [ -f "$TRIVY_IMG_FILE" ] && [ -s "$TRIVY_IMG_FILE" ]; then
            VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' "$TRIVY_IMG_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No HIGH/CRITICAL image vulnerabilities found."
            else
              STATUS="failed"
              DETAIL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL") | "[\(.Severity)] \(.VulnerabilityID) in \(.PkgName) \(.InstalledVersion) → \(.Title // "N/A")"] | unique | join("\n")' "$TRIVY_IMG_FILE")
            fi
          else
            STATUS="skipped"; DETAIL="Trivy image report not available."
          fi
          cat > allure-results/trivy-image-result.json <<EOF
          {
            "name": "Docker Image Vulnerability Scan (Trivy)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Trivy scan of the built Docker image for HIGH and CRITICAL CVEs.",
            "steps": [{ "name": "HIGH/CRITICAL CVEs in Image", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "Docker Image Vulnerability Scan" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── OWASP ──────────────────────────────────────────────────────
          OWASP_JSON="raw-reports/owasp/dependency-check-report.json"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          OWASP_HTML_URL="https://${OWNER}.github.io/${REPO}/owasp/dependency-check-report.html"
          if [ -f "$OWASP_JSON" ] && [ -s "$OWASP_JSON" ]; then
            if ! jq empty "$OWASP_JSON" 2>/dev/null; then
              STATUS="skipped"; DETAIL="OWASP JSON file exists but is not valid JSON."
            else
              VULN_COUNT=$(jq '[.dependencies[]?.vulnerabilities // [] | .[]] | length' "$OWASP_JSON" 2>/dev/null || echo 0)
              if [ "$VULN_COUNT" -eq 0 ]; then
                STATUS="passed"; DETAIL="No vulnerable dependencies found."
              else
                STATUS="failed"
                DETAIL=$(jq -r '[.dependencies[]? | . as $dep | (.vulnerabilities // [])[] | "[\(.severity // "UNKNOWN")] \(.name) in \($dep.fileName // "unknown") — \((.description // "") | .[0:100])"] | join("\n")' "$OWASP_JSON" 2>/dev/null || echo "$VULN_COUNT vulnerabilities found.")
              fi
            fi
          else
            STATUS="skipped"; DETAIL="OWASP JSON report not found."
          fi
          cat > allure-results/owasp-result.json <<EOF
          {
            "name": "OWASP Dependency Check",
            "status": "$STATUS",
            "stage": "finished",
            "description": "OWASP Dependency Check cross-referenced against the NVD database. Fails on CVSS >= 7.",
            "links": [{ "name": "Full OWASP HTML Report", "url": "$OWASP_HTML_URL", "type": "tms" }],
            "steps": [{ "name": "Vulnerable Dependencies Detected", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "OWASP Dependency Check" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

      # ── Checkout gh-pages for history ──────────────────────────────────
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      # ── Generate per-branch Allure report ──────────────────────────────
      - name: Generate Allure Report per Branch
        uses: mgrybyk-org/allure-report-branch-action@v1
        if: always()
        continue-on-error: true
        id: allure
        with:
          report_id: ${{ github.ref_name }}
          gh_pages: gh-pages-dir
          report_dir: allure-results

      # ── Clean up and assemble gh-pages dir ─────────────────────────────
      - name: Assemble gh-pages directory
        if: always()
        run: |
          sudo chown -R $USER:$USER gh-pages-dir

          # Remove any source files that leaked from the main branch checkout
          find gh-pages-dir -maxdepth 1 -name "*.md" -delete
          find gh-pages-dir -maxdepth 1 -name "*.json" -delete
          find gh-pages-dir -maxdepth 1 -name "*.js" -delete
          find gh-pages-dir -maxdepth 1 -name "*.yml" -delete
          find gh-pages-dir -maxdepth 1 -name "Dockerfile" -delete

          # Add OWASP HTML report
          mkdir -p gh-pages-dir/owasp
          cp raw-reports/owasp/dependency-check-report.html \
             gh-pages-dir/owasp/dependency-check-report.html

          # Base URL — preserve case exactly as GitHub Pages serves it
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          # Build root index — cards link to latest.html for instant report access
          # Branch folders live at allure-action/<branch>/<branch>/
          BRANCHES=$(find gh-pages-dir/allure-action -mindepth 1 -maxdepth 1 -type d \
                     2>/dev/null | xargs -I{} basename {} | sort)

          cat > gh-pages-dir/index.html <<HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
            <title>PDF-Labs CI Security Reports</title>
            <style>
              *{box-sizing:border-box;margin:0;padding:0}
              body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;padding:40px 20px}
              h1{color:#58a6ff;font-size:1.8rem;margin-bottom:8px}
              .sub{color:#8b949e;margin-bottom:40px;font-size:.95rem}
              .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;max-width:1100px;margin-bottom:40px}
              .card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;color:inherit;transition:border-color .2s,transform .2s}
              .card:hover{border-color:#58a6ff;transform:translateY(-2px)}
              .card h2{font-size:1rem;color:#58a6ff;margin-bottom:12px;word-break:break-all}
              .btn{display:inline-block;text-decoration:none;padding:6px 14px;border-radius:6px;font-size:.82rem;margin-top:4px;margin-right:6px}
              .btn-primary{background:#238636;color:#fff;border:1px solid #2ea043}
              .btn-primary:hover{background:#2ea043}
              .btn-secondary{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
              .btn-secondary:hover{border-color:#58a6ff;color:#58a6ff}
              .shared{max-width:1100px;padding:20px;background:#161b22;border:1px solid #30363d;border-radius:10px;margin-bottom:40px}
              .shared h2{color:#58a6ff;font-size:1rem;margin-bottom:12px}
              .shared a{color:#58a6ff;font-size:.88rem;text-decoration:none}
              .shared a:hover{text-decoration:underline}
              footer{color:#484f58;font-size:.8rem;margin-top:20px}
            </style>
          </head>
          <body>
            <h1>🔐 PDF-Labs CI Security Reports</h1>
            <p class="sub">Per-branch Allure security scan results. Click <strong>Latest Report</strong> for the most recent run, or <strong>History</strong> for all runs on that branch.</p>
            <div class="grid">
          HTMLEOF

          for BRANCH in $BRANCHES; do
            LATEST_URL="${BASE_URL}/allure-action/${BRANCH}/${BRANCH}/latest.html"
            HISTORY_URL="${BASE_URL}/allure-action/${BRANCH}/${BRANCH}/"
            cat >> gh-pages-dir/index.html <<CARDEOF
              <div class="card">
                <h2>🌿 ${BRANCH}</h2>
                <a class="btn btn-primary" href="${LATEST_URL}">Latest Report</a>
                <a class="btn btn-secondary" href="${HISTORY_URL}">History</a>
              </div>
          CARDEOF
          done

          cat >> gh-pages-dir/index.html <<HTMLEOF
            </div>
            <div class="shared">
              <h2>📄 Shared Reports</h2>
              <a href="${BASE_URL}/owasp/dependency-check-report.html">OWASP Dependency Check HTML Report</a>
            </div>
            <footer>Generated by GitHub Actions · PDF-Labs CI Pipeline</footer>
          </body>
          </html>
          HTMLEOF
          
      # ── Single push of everything to gh-pages ──────────────────────────
      - name: Push to gh-pages
        uses: mgrybyk-org/git-commit-pull-push-action@v1
        if: always()
        with:
          repository: gh-pages-dir
          branch: gh-pages
          pull_args: --rebase -X ours
