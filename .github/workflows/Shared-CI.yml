  # ── Docker Image Build ────────────────────────────────────────────────
  docker-build-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    needs: owasp-dependency-check

    permissions:
      contents: read
      packages: write   # required for GHCR push
  
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
  
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
  
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/pdf-labs-deployment-${{ github.ref_name }}:${{ github.sha }}

  # ── Docker Image Vulnerability Scan ──────────────────────────────────
  trivy-image-scan:
    name: Docker Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Generate Image Scan Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ghcr.io/pdf-labs-deployment-${{ github.ref_name }}:${{ github.sha }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Upload Image Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 7

      - name: Fail on High/Critical Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ghcr.io/pdf-labs-deployment-${{ github.ref_name }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          skip-setup-trivy: true
