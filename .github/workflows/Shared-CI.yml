      # ── Checkout gh-pages for history ──────────────────────────────────
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      # ── Generate per-branch Allure report ──────────────────────────────
      - name: Generate Allure Report per Branch
        uses: mgrybyk-org/allure-report-branch-action@v1
        if: always()
        continue-on-error: true
        id: allure
        with:
          report_id: ${{ github.ref_name }}
          gh_pages: gh-pages-dir
          report_dir: allure-results
          
      # ── Clean up and assemble gh-pages dir ─────────────────────────────
      - name: Assemble gh-pages directory
        if: always()
        run: |
          sudo chown -R $USER:$USER gh-pages-dir

          # Remove any source files that leaked from the main branch checkout
          find gh-pages-dir -maxdepth 1 -name "*.md" -delete
          find gh-pages-dir -maxdepth 1 -name "*.json" -delete
          find gh-pages-dir -maxdepth 1 -name "*.js" -delete
          find gh-pages-dir -maxdepth 1 -name "*.yml" -delete
          find gh-pages-dir -maxdepth 1 -name "Dockerfile" -delete

          # Store OWASP HTML report under owasp/<branch>/<run_number>/
          BRANCH="${{ github.ref_name }}"
          RUN_NUMBER="${{ github.run_number }}"
          mkdir -p "gh-pages-dir/owasp/${BRANCH}/${RUN_NUMBER}"
          cp raw-reports/owasp/dependency-check-report.html \
             "gh-pages-dir/owasp/${BRANCH}/${RUN_NUMBER}/dependency-check-report.html"
             
          # Store all scan HTML reports under scan-reports/<branch>/<run_number>/
          mkdir -p "gh-pages-dir/scan-reports/${BRANCH}/${RUN_NUMBER}"
          cp scan-html-reports/npm-audit-report.html \
             "gh-pages-dir/scan-reports/${BRANCH}/${RUN_NUMBER}/npm-audit-report.html"
          cp scan-html-reports/gitleaks-report.html \
             "gh-pages-dir/scan-reports/${BRANCH}/${RUN_NUMBER}/gitleaks-report.html"
          cp scan-html-reports/hadolint-report.html \
             "gh-pages-dir/scan-reports/${BRANCH}/${RUN_NUMBER}/hadolint-report.html"
          cp scan-html-reports/trivy-fs-report.html \
             "gh-pages-dir/scan-reports/${BRANCH}/${RUN_NUMBER}/trivy-fs-report.html"
          cp scan-html-reports/trivy-image-report.html \
             "gh-pages-dir/scan-reports/${BRANCH}/${RUN_NUMBER}/trivy-image-report.html"
          cp scan-html-reports/grype-image-report.html \
             "gh-pages-dir/scan-reports/${BRANCH}/${RUN_NUMBER}/grype-image-report.html"
             
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          # Collect all branches that have Allure reports
          BRANCHES=$(find gh-pages-dir/allure-action -mindepth 1 -maxdepth 1 -type d \
                     2>/dev/null | xargs -I{} basename {} | sort)

          # ── Build dashboard index.html ──────────────────────────────────
          cat > gh-pages-dir/index.html <<HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
            <title>PDF-Labs CI Security Reports</title>
            <style>
              *{box-sizing:border-box;margin:0;padding:0}
              body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;padding:40px 20px}
              h1{color:#58a6ff;font-size:1.8rem;margin-bottom:8px}
              .sub{color:#8b949e;margin-bottom:40px;font-size:.95rem}
              h2.section{color:#8b949e;font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;margin-top:40px}
              .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;max-width:1100px}
              .card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;color:inherit;transition:border-color .2s}
              .card:hover{border-color:#58a6ff}
              .card-title{font-size:1rem;color:#58a6ff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
              .btn{display:inline-block;text-decoration:none;padding:6px 14px;border-radius:6px;font-size:.82rem;margin-right:6px;margin-bottom:6px;cursor:pointer;border:none;font-family:inherit}
              .btn-primary{background:#238636;color:#fff;border:1px solid #2ea043}
              .btn-primary:hover{background:#2ea043}
              .btn-secondary{background:#21262d;color:#c9d1d9;border:1px solid #30363d;cursor:pointer}
              .btn-secondary:hover{border-color:#58a6ff;color:#58a6ff}
              .dropdown{display:none;margin-top:12px;border-top:1px solid #30363d;padding-top:12px}
              .dropdown.open{display:block}
              .dropdown-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #21262d;font-size:.82rem;gap:8px}
              .dropdown-item:last-child{border-bottom:none}
              .dropdown-item span{color:#8b949e;flex:1}
              .dropdown-item a{color:#58a6ff;text-decoration:none;white-space:nowrap;font-size:.8rem;padding:3px 8px;border:1px solid #30363d;border-radius:4px}
              .dropdown-item a:hover{border-color:#58a6ff;background:#161b22}
              .commit-sha{font-family:monospace;color:#e3b341;font-size:.78rem}
              .owasp-section{max-width:1100px;margin-top:8px}
              .owasp-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;margin-bottom:12px}
              .owasp-card-title{font-size:.95rem;color:#58a6ff;margin-bottom:0;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
              .owasp-card-title:hover{color:#79c0ff}
              .chevron{transition:transform .2s;display:inline-block;margin-left:8px}
              .chevron.open{transform:rotate(180deg)}
              footer{color:#484f58;font-size:.8rem;margin-top:50px}
              .badge-pass{background:#1a4731;color:#3fb950;border-radius:4px;padding:2px 7px;font-size:.75rem}
              .badge-none{background:#21262d;color:#8b949e;border-radius:4px;padding:2px 7px;font-size:.75rem}
            </style>
          </head>
          <body>
            <h1>🔐 PDF-Labs CI Security Reports</h1>
            <p class="sub">Per-branch security scan results powered by Allure. Use the buttons to view the latest report or expand history for past commits.</p>

            <h2 class="section">Branch Reports</h2>
            <div class="grid">
          HTMLEOF

          # ── Branch cards ───────────────────────────────────────────────
          for BRANCH in $BRANCHES; do
            LATEST_URL="${BASE_URL}/allure-action/${BRANCH}/${BRANCH}/latest.html"
            BRANCH_DIR="gh-pages-dir/allure-action/${BRANCH}/${BRANCH}"

            # Collect past run folders (numeric dirs sorted descending = newest first)
            RUN_DIRS=$(find "$BRANCH_DIR" -mindepth 1 -maxdepth 1 -type d \
                       2>/dev/null | grep -E '/[0-9_]+$' | sort -t_ -k1 -rn)

            cat >> gh-pages-dir/index.html <<CARDEOF
              <div class="card">
                <div class="card-title">🌿 ${BRANCH}</div>
                <a class="btn btn-primary" href="${LATEST_URL}" target="_blank">Latest Report</a>
                <button class="btn btn-secondary" onclick="toggleDropdown('hist-${BRANCH}', this)">▾ History</button>
                <div class="dropdown" id="hist-${BRANCH}">
          CARDEOF

            if [ -z "$RUN_DIRS" ]; then
              echo "        <div style='color:#8b949e;font-size:.82rem;padding:8px 0'>No history yet.</div>" >> gh-pages-dir/index.html
            else
              for RUN_DIR in $RUN_DIRS; do
                RUN_ID=$(basename "$RUN_DIR")
                # run_id format from the action: <run_number>_<timestamp> or just a number
                # extract just the run number part (before underscore if present)
                RUN_NUM=$(echo "$RUN_ID" | cut -d_ -f1)
                REPORT_URL="${BASE_URL}/allure-action/${BRANCH}/${BRANCH}/${RUN_ID}/index.html"

                # Try to get date from the report's summary.json if it exists
                SUMMARY_FILE="${RUN_DIR}/summary.json"
                if [ -f "$SUMMARY_FILE" ]; then
                  RUN_DATE=$(jq -r '.time.stop // empty' "$SUMMARY_FILE" 2>/dev/null | \
                             xargs -I{} date -d "@{}" "+%Y-%m-%d %H:%M" 2>/dev/null || echo "")
                fi
                [ -z "$RUN_DATE" ] && RUN_DATE="Run #${RUN_NUM}"

                cat >> gh-pages-dir/index.html <<ROWEOF
                  <div class="dropdown-item">
                    <span>${RUN_DATE}</span>
                    <span class="commit-sha">#${RUN_NUM}</span>
                    <a href="${REPORT_URL}" target="_blank">View Report</a>
                  </div>
          ROWEOF
              done
            fi

            cat >> gh-pages-dir/index.html <<CARDEOF
                </div>
              </div>
          CARDEOF
          done       

          # ── Close page ─────────────────────────────────────────────────
          cat >> gh-pages-dir/index.html <<HTMLEOF
            </div>
            <footer>Generated by GitHub Actions · PDF-Labs CI Pipeline · Run #${{ github.run_number }}</footer>

            <script>
              function toggleDropdown(id, btn) {
                const el = document.getElementById(id);
                const isOpen = el.classList.toggle('open');
                // update chevron if inside owasp card title
                const chevron = btn.querySelector('.chevron');
                if (chevron) chevron.classList.toggle('open', isOpen);
              }
            </script>
          </body>
          </html>
          HTMLEOF

      # ── Single push of everything to gh-pages ──────────────────────────
      - name: Push to gh-pages
        uses: mgrybyk-org/git-commit-pull-push-action@v1
        if: always()
        with:
          repository: gh-pages-dir
          branch: gh-pages
          pull_args: --rebase -X ours
