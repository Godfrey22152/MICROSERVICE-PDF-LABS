name: Shared CI

on:
  workflow_call:

jobs:
  # ── Syntax Check ──────────────────────────────────────────────────────
  compile:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          for file in $(find . -name "*.js" -not -path "*/node_modules/*"); do
            echo "Checking $file"
            node --check "$file"
          done
          
  # ── Dependency Audit ───────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high  # Fails the build if any high or critical vulnerabilities are found in the declared dependencies
        
  # ── Secret Scanning ───────────────────────────────────────────────────
  gitleaks-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: dependency-audit
    steps: 
    
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: GitLeaks Setup
        uses: gitleaks/gitleaks-action@v2
        
      - name: Run GitLeaks Scan
        run: gitleaks detect --source . --exit-code 1

  # ── Dockerfile Lint ───────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning   # Fails on any warning or error level finding
          format: json
          output-file: hadolint-report.json
          no-color: false

      - name: Upload Hadolint Report
        uses: actions/upload-artifact@v4
        with:
          name: hadolint-report
          path: hadolint-report.json
          retention-days: 7
        
  # ── Filesystem Vulnerability Scan ────────────────────────────────────
  trivy-fs-scan:
    runs-on: ubuntu-latest
    needs: dockerfile-lint
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Generate Trivy Vulnerability Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          output: trivy-report.json
          format: json
          scan-ref: .
          exit-code: 0
      
      - name: Upload Vulnerability Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7

      - name: Fail build on High/Criticial Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          format: table
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          # On a subsequent call to the action we know trivy is already installed so can skip this
          skip-setup-trivy: true

  # ── OWASP Dependency Check ────────────────────────────────────────────
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: trivy-fs-scan
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "PDF-Labs"
          path: "."
          format: "HTML"
          out: "owasp-report"
          args: >
            --enableRetired
            --failOnCVSS 7
            --exclude "**/node_modules/**"  
        # Fails if any dependency has a CVSS score of 7 or higher (high/critical)
        # Cross-references the NVD database directly — more thorough than npm audit
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: owasp-report/
          retention-days: 7

  # ── SonarQube Static Analysis ────────────────────────────────────────
