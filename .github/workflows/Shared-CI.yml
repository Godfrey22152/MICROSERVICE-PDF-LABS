name: Shared CI

on:
  workflow_call:
  push:
  pull_request:

permissions:
  contents: read
  packages: write
  pull-requests: write
  checks: write

jobs:
  # ── Syntax Check ──────────────────────────────────────────────────────
  compile:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          for file in $(find . -name "*.js" -not -path "*/node_modules/*"); do
            echo "Checking $file"
            node --check "$file"
          done
          
  # ── Dependency Audit ───────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        # Continues even on failure so we can upload the report
        run: npm audit --audit-level=high --json > npm-audit-report.json || true
        
      - name: Fail on high/critical vulnerabilities
        run: |
          HIGH=$(cat npm-audit-report.json | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const r=JSON.parse(d);
            const vulns=r.metadata?.vulnerabilities || {};
            console.log((vulns.high||0)+(vulns.critical||0));
          ")
          echo "High/Critical vulnerabilities found: $HIGH"
          if [ "$HIGH" -gt "0" ]; then
            echo "Build failed due to high/critical vulnerabilities."
            exit 1
          fi
    
      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 7
        
  # ── Secret Scanning ───────────────────────────────────────────────────
  gitleaks-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: dependency-audit
    steps: 
    
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: GitLeaks Setup
        uses: gitleaks/gitleaks-action@v2
        
      - name: Run GitLeaks Scan
        run: gitleaks detect --source . --exit-code 1

  # ── Dockerfile Lint ───────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning   # Fails on any warning or error level finding
          format: json
          output-file: hadolint-report.json
          no-color: false

      - name: Upload Hadolint Report
        uses: actions/upload-artifact@v4
        with:
          name: hadolint-report
          path: hadolint-report.json
          retention-days: 7
        
  # ── Filesystem Vulnerability Scan ────────────────────────────────────
  trivy-fs-scan:
    runs-on: ubuntu-latest
    needs: dockerfile-lint
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Generate Trivy Vulnerability Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          output: trivy-report.json
          format: json
          scan-ref: .
          exit-code: 0
      
      - name: Upload Vulnerability Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7

      - name: Fail build on High/Criticial Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          format: table
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          # On a subsequent call to the action we know trivy is already installed so can skip this
          skip-setup-trivy: true

  # ── OWASP Dependency Check ────────────────────────────────────────────
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: trivy-fs-scan
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "PDF-Labs"
          path: "."
          format: "HTML"
          out: "owasp-report"
          args: >
            --enableRetired
            --failOnCVSS 7
            --exclude "**/node_modules/**"  
        # Fails if any dependency has a CVSS score of 7 or higher (high/critical)
        # Cross-references the NVD database directly — more thorough than npm audit
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: owasp-report/
          retention-days: 7

  # ── SonarQube Static Analysis ────────────────────────────────────────
  Sonarqube-scans:
    name: SonarQube Static Analysis
    runs-on: self-hosted-runner
    needs: owasp-dependency-check
    steps:
      - name: Check out Git repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        with:
          args: >
            -Dsonar.projectKey=PDF-Labs-Project-key
            -Dsonar.projectName=PDF-Labs-Project
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.github/**,**/.gitignore,**/.dockerignore
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Docker Image Build ────────────────────────────────────────────────
  docker-build-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    needs: Sonarqube-scans

    permissions:
      contents: read
      packages: write   # required for GHCR push
  
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
  
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
  
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/pdf-labs:${{ github.sha }}

  # ── Docker Image Vulnerability Scan ──────────────────────────────────
  trivy-image-scan:
    name: Docker Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Generate Image Scan Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}/pdf-labs:${{ github.sha }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Upload Image Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 7

      - name: Fail on High/Critical Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}/pdf-labs:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          skip-setup-trivy: true

  # ── Allure Report ────────────────────────────────────────────────────
  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: trivy-image-scan
    if: always()    # Runs even if previous jobs failed so you always get a report
    permissions:
      pull-requests: write
      checks: write
      
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports # Downloads every artifact into all-reports/<artifact-name>/

      - name: Install Allure CLI
        run: |
          wget -qO allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Convert scan reports to Allure results format
        run: |
          mkdir -p allure-results

          # ── npm audit ─────────────────────────────────────────────────
          if [ -f all-reports/npm-audit-report/npm-audit-report.json ]; then
            node -e "
              const fs = require('fs');
              const raw = JSON.parse(fs.readFileSync('all-reports/npm-audit-report/npm-audit-report.json','utf8'));
              const vulns = raw.vulnerabilities || {};
              const results = Object.entries(vulns).map(([name, v]) => ({
                name: 'npm audit: ' + name,
                status: (v.severity === 'high' || v.severity === 'critical') ? 'failed' : 'passed',
                severity: v.severity,
              }));
              results.forEach((r, i) => {
                const allure = {
                  uuid: 'npm-' + i,
                  historyId: 'npm-' + i,
                  name: r.name,
                  status: r.status,
                  labels: [
                    { name: 'suite', value: 'Dependency Audit' },
                    { name: 'severity', value: r.severity }
                  ],
                  start: Date.now(),
                  stop: Date.now()
                };
                fs.writeFileSync('allure-results/npm-' + i + '-result.json', JSON.stringify(allure));
              });
              console.log('npm audit: ' + results.length + ' results written');
            "
          fi

          # ── Hadolint ──────────────────────────────────────────────────
          if [ -f all-reports/hadolint-report/hadolint-report.json ]; then
            node -e "
              const fs = require('fs');
              const raw = JSON.parse(fs.readFileSync('all-reports/hadolint-report/hadolint-report.json','utf8'));
              const findings = Array.isArray(raw) ? raw : [];
              if (findings.length === 0) {
                const r = {
                  uuid: 'hadolint-clean', historyId: 'hadolint-clean',
                  name: 'Hadolint: Dockerfile passed all checks',
                  status: 'passed',
                  labels: [{ name: 'suite', value: 'Dockerfile Lint' }],
                  start: Date.now(), stop: Date.now()
                };
                fs.writeFileSync('allure-results/hadolint-clean-result.json', JSON.stringify(r));
              } else {
                findings.forEach((f, i) => {
                  const r = {
                    uuid: 'hadolint-' + i, historyId: 'hadolint-' + i,
                    name: 'Hadolint: ' + f.code + ' — ' + f.message,
                    status: (f.level === 'error' || f.level === 'warning') ? 'failed' : 'passed',
                    labels: [
                      { name: 'suite', value: 'Dockerfile Lint' },
                      { name: 'severity', value: f.level }
                    ],
                    statusDetails: { message: f.message, trace: 'Line ' + f.line },
                    start: Date.now(), stop: Date.now()
                  };
                  fs.writeFileSync('allure-results/hadolint-' + i + '-result.json', JSON.stringify(r));
                });
              }
              console.log('Hadolint: ' + findings.length + ' findings written');
            "
          fi

          # ── Trivy FS ──────────────────────────────────────────────────
          if [ -f all-reports/trivy-fs-report/trivy-fs-report.json ]; then
            node -e "
              const fs = require('fs');
              const raw = JSON.parse(fs.readFileSync('all-reports/trivy-fs-report/trivy-fs-report.json','utf8'));
              const results = raw.Results || [];
              let idx = 0;
              results.forEach(res => {
                (res.Vulnerabilities || []).forEach(v => {
                  const r = {
                    uuid: 'trivy-fs-' + idx, historyId: 'trivy-fs-' + idx,
                    name: 'Trivy FS: ' + v.VulnerabilityID + ' in ' + v.PkgName,
                    status: (v.Severity === 'HIGH' || v.Severity === 'CRITICAL') ? 'failed' : 'passed',
                    labels: [
                      { name: 'suite', value: 'Filesystem Vulnerability Scan' },
                      { name: 'severity', value: v.Severity }
                    ],
                    statusDetails: { message: v.Title || v.Description || '', trace: v.PrimaryURL || '' },
                    start: Date.now(), stop: Date.now()
                  };
                  fs.writeFileSync('allure-results/trivy-fs-' + idx + '-result.json', JSON.stringify(r));
                  idx++;
                });
              });
              if (idx === 0) {
                const r = {
                  uuid: 'trivy-fs-clean', historyId: 'trivy-fs-clean',
                  name: 'Trivy FS: No vulnerabilities found',
                  status: 'passed',
                  labels: [{ name: 'suite', value: 'Filesystem Vulnerability Scan' }],
                  start: Date.now(), stop: Date.now()
                };
                fs.writeFileSync('allure-results/trivy-fs-clean-result.json', JSON.stringify(r));
              }
              console.log('Trivy FS: ' + idx + ' vulnerabilities written');
            "
          fi

          # ── Trivy Image ───────────────────────────────────────────────
          if [ -f all-reports/trivy-image-report/trivy-image-report.json ]; then
            node -e "
              const fs = require('fs');
              const raw = JSON.parse(fs.readFileSync('all-reports/trivy-image-report/trivy-image-report.json','utf8'));
              const results = raw.Results || [];
              let idx = 0;
              results.forEach(res => {
                (res.Vulnerabilities || []).forEach(v => {
                  const r = {
                    uuid: 'trivy-img-' + idx, historyId: 'trivy-img-' + idx,
                    name: 'Trivy Image: ' + v.VulnerabilityID + ' in ' + v.PkgName,
                    status: (v.Severity === 'HIGH' || v.Severity === 'CRITICAL') ? 'failed' : 'passed',
                    labels: [
                      { name: 'suite', value: 'Docker Image Vulnerability Scan' },
                      { name: 'severity', value: v.Severity }
                    ],
                    statusDetails: { message: v.Title || v.Description || '', trace: v.PrimaryURL || '' },
                    start: Date.now(), stop: Date.now()
                  };
                  fs.writeFileSync('allure-results/trivy-img-' + idx + '-result.json', JSON.stringify(r));
                  idx++;
                });
              });
              if (idx === 0) {
                const r = {
                  uuid: 'trivy-img-clean', historyId: 'trivy-img-clean',
                  name: 'Trivy Image: No vulnerabilities found',
                  status: 'passed',
                  labels: [{ name: 'suite', value: 'Docker Image Vulnerability Scan' }],
                  start: Date.now(), stop: Date.now()
                };
                fs.writeFileSync('allure-results/trivy-img-clean-result.json', JSON.stringify(r));
              }
              console.log('Trivy Image: ' + idx + ' vulnerabilities written');
            "
          fi

      - name: Generate Allure HTML Report
        run: allure generate allure-results --clean -o allure-report

      # ── Official Allure GitHub Action ─────────────────────────────────
      # Posts a visual summary table as a PR comment and creates a
      # GitHub Check with pass/fail status based on quality gate settings.
      # Only runs on pull_request events — has no effect on plain pushes.
      - name: Post Allure summary to PR
        uses: allure-framework/allure-action@v0
        with:
          report-directory: "./allure-report"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Allure HTML Report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Allure raw results artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7
