name: Shared CI

on:
  workflow_call:

jobs:
  # ── Syntax Check ──────────────────────────────────────────────────────
  compile:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          for file in $(find . -name "*.js" -not -path "*/node_modules/*"); do
            echo "Checking $file"
            node --check "$file"
          done
          
  # ── Dependency Audit ───────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high  # Fails the build if any high or critical vulnerabilities are found in the declared dependencies
        
  # ── Secret Scanning ───────────────────────────────────────────────────
  gitleaks-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: dependency-audit
    steps: 
    
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: GitLeaks Setup
        uses: gitleaks/gitleaks-action@v2
        
      - name: Run GitLeaks Scan
        run: gitleaks detect --source . --exit-code 1

  # ── Dockerfile Lint ───────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    needs: gitleaks-scan
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning   # Fails on any warning or error level finding
          format: json
          output-file: hadolint-report.json
          no-color: false

      - name: Upload Hadolint Report
        uses: actions/upload-artifact@v4
        with:
          name: hadolint-report
          path: hadolint-report.json
          retention-days: 7
        
  # ── Filesystem Vulnerability Scan ────────────────────────────────────
  trivy-fs-scan:
    runs-on: ubuntu-latest
    needs: dockerfile-lint
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Generate Trivy Vulnerability Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          output: trivy-report.json
          format: json
          scan-ref: .
          exit-code: 0
      
      - name: Upload Vulnerability Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7

      - name: Fail build on High/Criticial Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          format: table
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          # On a subsequent call to the action we know trivy is already installed so can skip this
          skip-setup-trivy: true

  # ── OWASP Dependency Check ────────────────────────────────────────────
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: trivy-fs-scan
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "PDF-Labs"
          path: "."
          format: "HTML" 
          out: "owasp-report"
          args: >
            --format HTML,JSON
            --enableRetired
            --failOnCVSS 7
            --exclude "**/node_modules/**"  
        # Fails if any dependency has a CVSS score of 7 or higher (high/critical)
        # Cross-references the NVD database directly — more thorough than npm audit
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: owasp-report/
          retention-days: 7

  # ── SonarQube Static Analysis ────────────────────────────────────────
  #Sonarqube-scans:
    #name: SonarQube Static Analysis
    #runs-on: self-hosted-runner
    #needs: owasp-dependency-check
    #steps:
      #- name: Check out Git repository
        #uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        #with:
          #fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      
      #- name: SonarQube Scan
        #uses: SonarSource/sonarqube-scan-action@master
        #with:
          #args: >
            #-Dsonar.projectKey=PDF-Labs-Project-key
            #-Dsonar.projectName=PDF-Labs-Project
            #-Dsonar.sources=.
            #-Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.github/**,**/.gitignore,**/.dockerignore
        #env:
          #SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          #SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Docker Image Build ────────────────────────────────────────────────
  docker-build-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    needs: owasp-dependency-check

    permissions:
      contents: read
      packages: write   # required for GHCR push
  
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/$OWNER/$REPO/pdf-labs-deployment-$BRANCH:${{ github.sha }}" >> $GITHUB_ENV
  
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
  
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

  # ── Docker Image Vulnerability Scan ──────────────────────────────────
  trivy-image-scan:
    name: Docker Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/$OWNER/$REPO/pdf-labs-deployment-$BRANCH:${{ github.sha }}" >> $GITHUB_ENV

      - name: Generate Image Scan Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Upload Image Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 7

      - name: Fail on High/Critical Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          skip-setup-trivy: true

  # ── Allure Security Report ────────────────────────────────────────────
  allure-report:
    name: Generate Allure Security Report
    runs-on: ubuntu-latest
    needs: trivy-image-scan
    if: always()

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Download Hadolint Report
        uses: actions/download-artifact@v4
        with:
          name: hadolint-report
          path: raw-reports/hadolint
        continue-on-error: true

      - name: Download Trivy FS Report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: raw-reports/trivy-fs
        continue-on-error: true

      - name: Download OWASP Report
        uses: actions/download-artifact@v4
        with:
          name: owasp-dependency-report
          path: raw-reports/owasp
        continue-on-error: true

      - name: Download Trivy Image Report
        uses: actions/download-artifact@v4
        with:
          name: trivy-image-report
          path: raw-reports/trivy-image
        continue-on-error: true

      - name: Convert Reports to Allure Results
        run: |
          mkdir -p allure-results

          # ── Hadolint ───────────────────────────────────────────────────
          HADOLINT_FILE="raw-reports/hadolint/hadolint-report.json"
          if [ -f "$HADOLINT_FILE" ] && [ -s "$HADOLINT_FILE" ]; then
            COUNT=$(jq 'length' "$HADOLINT_FILE")
            if [ "$COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No Dockerfile issues found."
            else
              STATUS="failed"
              DETAIL=$(jq -r '[.[] | "[\(.level | ascii_upcase)] \(.code): \(.message) (line \(.line))"] | join("\n")' "$HADOLINT_FILE")
            fi
          else
            STATUS="skipped"; DETAIL="Hadolint report not available."
          fi
          cat > allure-results/hadolint-result.json <<EOF
          {
            "name": "Dockerfile Lint (Hadolint)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Hadolint static analysis of the project Dockerfile.",
            "steps": [
              {
                "name": "Hadolint Findings",
                "status": "$STATUS",
                "stage": "finished",
                "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) }
              }
            ],
            "labels": [
              { "name": "suite",    "value": "Security Scans" },
              { "name": "feature",  "value": "Dockerfile Lint" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Trivy FS ───────────────────────────────────────────────────
          TRIVY_FS_FILE="raw-reports/trivy-fs/trivy-report.json"
          if [ -f "$TRIVY_FS_FILE" ] && [ -s "$TRIVY_FS_FILE" ]; then
            VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' "$TRIVY_FS_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No HIGH/CRITICAL filesystem vulnerabilities found."
            else
              STATUS="failed"
              DETAIL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL") | "[\(.Severity)] \(.VulnerabilityID) in \(.PkgName) \(.InstalledVersion) → \(.Title // "N/A")"] | unique | join("\n")' "$TRIVY_FS_FILE")
            fi
          else
            STATUS="skipped"; DETAIL="Trivy FS report not available."
          fi
          cat > allure-results/trivy-fs-result.json <<EOF
          {
            "name": "Filesystem Vulnerability Scan (Trivy)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Trivy scan of the repository filesystem for HIGH and CRITICAL CVEs.",
            "steps": [
              {
                "name": "HIGH/CRITICAL CVEs Found",
                "status": "$STATUS",
                "stage": "finished",
                "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) }
              }
            ],
            "labels": [
              { "name": "suite",    "value": "Security Scans" },
              { "name": "feature",  "value": "Filesystem Vulnerability Scan" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Trivy Image ────────────────────────────────────────────────
          TRIVY_IMG_FILE="raw-reports/trivy-image/trivy-image-report.json"
          if [ -f "$TRIVY_IMG_FILE" ] && [ -s "$TRIVY_IMG_FILE" ]; then
            VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' "$TRIVY_IMG_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No HIGH/CRITICAL image vulnerabilities found."
            else
              STATUS="failed"
              DETAIL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL") | "[\(.Severity)] \(.VulnerabilityID) in \(.PkgName) \(.InstalledVersion) → \(.Title // "N/A")"] | unique | join("\n")' "$TRIVY_IMG_FILE")
            fi
          else
            STATUS="skipped"; DETAIL="Trivy image report not available."
          fi
          cat > allure-results/trivy-image-result.json <<EOF
          {
            "name": "Docker Image Vulnerability Scan (Trivy)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Trivy scan of the built Docker image for HIGH and CRITICAL CVEs.",
            "steps": [
              {
                "name": "HIGH/CRITICAL CVEs in Image",
                "status": "$STATUS",
                "stage": "finished",
                "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) }
              }
            ],
            "labels": [
              { "name": "suite",    "value": "Security Scans" },
              { "name": "feature",  "value": "Docker Image Vulnerability Scan" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── OWASP Dependency Check ─────────────────────────────────────
          # ── OWASP Dependency Check ─────────────────────────────────────
          OWASP_JSON="raw-reports/owasp/dependency-check-report.json"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          OWASP_HTML_URL="https://${OWNER}.github.io/${REPO}/owasp/dependency-check-report.html"

          if [ -f "$OWASP_JSON" ] && [ -s "$OWASP_JSON" ]; then
            if ! jq empty "$OWASP_JSON" 2>/dev/null; then
              STATUS="skipped"
              DETAIL="OWASP JSON file exists but is not valid JSON."
            else
              VULN_COUNT=$(jq '[.dependencies[]?.vulnerabilities // [] | .[]] | length' "$OWASP_JSON" 2>/dev/null || echo 0)
              if [ "$VULN_COUNT" -eq 0 ]; then
                STATUS="passed"
                DETAIL="No vulnerable dependencies found."
              else
                STATUS="failed"
                DETAIL=$(jq -r '
                  [.dependencies[]?
                    | . as $dep
                    | (.vulnerabilities // [])[]
                    | "[\(.severity // "UNKNOWN")] \(.name) in \($dep.fileName // "unknown") — \((.description // "") | .[0:100])"]
                  | join("\n")' "$OWASP_JSON" 2>/dev/null || echo "$VULN_COUNT vulnerabilities found.")
              fi
            fi
          else
            STATUS="skipped"
            DETAIL="OWASP JSON report not found."
          fi

          cat > allure-results/owasp-result.json <<EOF
          {
            "name": "OWASP Dependency Check",
            "status": "$STATUS",
            "stage": "finished",
            "description": "OWASP Dependency Check cross-referenced against the NVD database. Fails on CVSS >= 7.",
            "links": [
              {
                "name": "Full OWASP HTML Report",
                "url": "$OWASP_HTML_URL",
                "type": "tms"
              }
            ],
            "steps": [
              {
                "name": "Vulnerable Dependencies Detected",
                "status": "$STATUS",
                "stage": "finished",
                "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) }
              }
            ],
            "labels": [
              { "name": "suite",    "value": "Security Scans" },
              { "name": "feature",  "value": "OWASP Dependency Check" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF
      - name: Debug OWASP Artifact Contents
        run: |
          echo "=== Full directory tree of raw-reports ==="
          find raw-reports/ -type f | sort
          echo ""
          echo "=== OWASP folder specifically ==="
          find raw-reports/owasp -type f | sort 2>/dev/null || echo "OWASP folder is empty or missing"
          echo ""
          echo "=== First 50 lines of any JSON file found ==="
          for f in $(find raw-reports/owasp -name "*.json" 2>/dev/null); do
            echo "--- FILE: $f ---"
            head -50 "$f"
          done
          echo ""
          echo "=== List all file types found ==="
          find raw-reports/owasp -type f | sed 's/.*\.//' | sort | uniq -c
          
      # Pull existing gh-pages history before generating the new report
      - name: Get Allure History
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report with History
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 5

      # Deploy Allure report first as the root
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true

      # Deploy OWASP HTML into /owasp/ subdirectory separately
      - name: Deploy OWASP HTML Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: raw-reports/owasp
          destination_dir: owasp
          keep_files: true
     
