  # ── Docker Image Build ────────────────────────────────────────────────
  docker-build-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    needs: owasp-dependency-check

    permissions:
      contents: read
      packages: write   # required for GHCR push
  
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/$OWNER/$REPO/pdf-labs-deployment-$BRANCH:${{ github.sha }}" >> $GITHUB_ENV
  
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
  
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

  # ── Docker Image Vulnerability Scan ──────────────────────────────────
  trivy-image-scan:
    name: Docker Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/$OWNER/$REPO/pdf-labs-deployment-$BRANCH:${{ github.sha }}" >> $GITHUB_ENV

      - name: Generate Image Scan Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Upload Image Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 7

      - name: Fail on High/Critical Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          skip-setup-trivy: true

  # ── Allure Report Aggregation ────────────────────────────────────────
  allure-report:
    name: Allure Security Report
    runs-on: ubuntu-latest
    needs: trivy-image-scan

    steps:
      - name: Checkout (required for workspace)
        uses: actions/checkout@v4

      # ── Download all reports ─────────────────────────────────────────
      - name: Download Trivy FS report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy-fs

      - name: Download Trivy Image report
        uses: actions/download-artifact@v4
        with:
          name: trivy-image-report
          path: reports/trivy-image

      - name: Download OWASP report
        uses: actions/download-artifact@v4
        with:
          name: owasp-dependency-report
          path: reports/owasp

      - name: Download Hadolint report
        uses: actions/download-artifact@v4
        with:
          name: hadolint-report
          path: reports/hadolint

      # ── Install Allure CLI ───────────────────────────────────────────
      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.27.0.tgz
          tar -zxvf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # ── Prepare Allure results ───────────────────────────────────────
      - name: Prepare Allure Results
        run: |
          mkdir -p allure-results

          echo "Security Scan Summary" > allure-results/environment.properties

          echo "Trivy FS Scan" > allure-results/trivy-fs.txt
          cat reports/trivy-fs/trivy-report.json >> allure-results/trivy-fs.txt

          echo "Trivy Image Scan" > allure-results/trivy-image.txt
          cat reports/trivy-image/trivy-image-report.json >> allure-results/trivy-image.txt

          echo "Hadolint Scan" > allure-results/hadolint.txt
          cat reports/hadolint/hadolint-report.json >> allure-results/hadolint.txt

          echo "OWASP Report generated" > allure-results/owasp.txt

      # ── Generate Allure report ───────────────────────────────────────
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      # ── Upload Allure report ─────────────────────────────────────────
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7
