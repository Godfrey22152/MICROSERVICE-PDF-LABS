name: Shared CI

on:
  workflow_call:

jobs:
  # ── Syntax Check ──────────────────────────────────────────────────────
  compile:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          for file in $(find . -name "*.js" -not -path "*/node_modules/*"); do
            echo "Checking $file"
            node --check "$file"
          done
          
  # ── Dependency Audit ───────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --json > npm-audit-report.json || true
      
      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 7
      
      # Fails the build if any high or critical vulnerabilities are found in the declared dependencies
      - name: Fail on high/critical vulnerabilities
        run: |
          npm audit --audit-level=high
          
  # ── Secret Scanning ───────────────────────────────────────────────────
  gitleaks-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: compile 
    steps: 
    
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: GitLeaks Setup
        uses: gitleaks/gitleaks-action@v2

      - name: Run GitLeaks Scan 
        run: gitleaks detect --source . --report-format json --report-path gitleaks-report.json || true
      
      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 7
      
      # Fail separately
      - name: Fail on leaks
        run: gitleaks detect --source . --exit-code 1

  # ── Dockerfile Lint ───────────────────────────────────────────────────
  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true
        with:
          dockerfile: Dockerfile
          failure-threshold: warning   # Fails on any warning or error level finding
          format: json
          output-file: hadolint-report.json
          no-color: false

      - name: Upload Hadolint Report
        uses: actions/upload-artifact@v4
        with:
          name: hadolint-report
          path: hadolint-report.json
          retention-days: 7
        
  # ── Filesystem Vulnerability Scan ────────────────────────────────────
  trivy-fs-scan:
    runs-on: ubuntu-latest
    needs: compile 
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Generate Trivy Vulnerability Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          output: trivy-report.json
          format: json
          scan-ref: .
          exit-code: 0
      
      - name: Upload Vulnerability Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7

      - name: Fail build on High/Criticial Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          format: table
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          # On a subsequent call to the action we know trivy is already installed so can skip this
          skip-setup-trivy: true

  # ── OWASP Dependency Check ────────────────────────────────────────────
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "PDF-Labs"
          path: "."
          out: "owasp-report"
          format: 'HTML'
          args: >
            --format HTML 
            --format JSON
            --enableRetired
            --failOnCVSS 7
            --exclude "**/node_modules/**"  
        # Fails if any dependency has a CVSS score of 7 or higher (high/critical)
        # Cross-references the NVD database directly — more thorough than npm audit
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: owasp-report/
          retention-days: 7

  # ── SonarQube Static Analysis ────────────────────────────────────────
  #Sonarqube-scans:
    #name: SonarQube Static Analysis
    #runs-on: self-hosted-runner
    #needs: owasp-dependency-check
    #steps:
      #- name: Check out Git repository
        #uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        #with:
          #fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      
      #- name: SonarQube Scan
        #uses: SonarSource/sonarqube-scan-action@master
        #with:
          #args: >
            #-Dsonar.projectKey=PDF-Labs-Project-key
            #-Dsonar.projectName=PDF-Labs-Project
            #-Dsonar.sources=.
            #-Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.github/**,**/.gitignore,**/.dockerignore
        #env:
          #SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          #SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Docker Image Build ────────────────────────────────────────────────
  docker-build-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    needs: 
      - compile
      - dependency-audit
      - dockerfile-lint
      - gitleaks-scan
      - trivy-fs-scan
      - owasp-dependency-check

    permissions:
      contents: read
      id-token: write
      packages: write   # required for GHCR push
      
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
      digest: ${{ steps.build_push.outputs.digest }}
  
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        
      - name: Set image variables
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          BRANCH=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]')
  
          IMAGE="ghcr.io/$OWNER/$REPO/pdf-labs-deployment-$BRANCH"
          TAG="${{ github.sha }}"
  
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
  
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          
  # ── Docker Image Vulnerability Scan ──────────────────────────────────
  trivy-image-scan:
    name: Docker Image Vulnerability Scan
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Generate Image Scan Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ needs.docker-build-push.outputs.image }}@${{ needs.docker-build-push.outputs.digest }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Upload Image Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          retention-days: 7

      - name: Fail on High/Critical Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ needs.docker-build-push.outputs.image }}@${{ needs.docker-build-push.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          skip-setup-trivy: true

  # ── Grype Image Vulnerability Scan (Anchore) ──────────────────────────
  grype-image-scan:
    name: Docker Image Vulnerability Scan (Grype - Anchore)
    runs-on: ubuntu-latest
    needs: docker-build-push
  
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
  
      # Run Anchore scan (this uses Grype internally)
      - name: Run Anchore Container Scan
        uses: anchore/scan-action@v7
        with:
          image: ${{ needs.docker-build-push.outputs.image }}@${{ needs.docker-build-push.outputs.digest }}
          fail-build: false      # To avoid failing the build regardless of severity
          severity-cutoff: high
          output-format: json
          output-file: grype-image-report.json

      - name: Upload Grype Report
        uses: actions/upload-artifact@v4
        with:
          name: grype-image-report
          path: grype-image-report.json
          retention-days: 7

  # ── Cosign Sign ───────────────────────────────────────────────────────
  cosign-sign:
    name: Sign Container Image
    runs-on: ubuntu-latest
    needs:
      - docker-build-push
      - trivy-image-scan
      - grype-image-scan
  
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image by digest
        run: |
          cosign sign --yes \
          ${{ needs.docker-build-push.outputs.image }}@${{ needs.docker-build-push.outputs.digest }}
        
  # ── Cosign Verify ─────────────────────────────────────────────────────
  cosign-verify:
    name: Verify Cosign Signature
    runs-on: ubuntu-latest
    needs: 
      - docker-build-push
      - cosign-sign
      
  
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@v4.1.0

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Verify signature
      run: |
        cosign verify \
          --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
          --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/.*" \
          ${{ needs.docker-build-push.outputs.image }}@${{ needs.docker-build-push.outputs.digest }}
    
  # ── Allure Security Report ────────────────────────────────────────────
  allure-report:
    name: Generate Allure Security Report
    runs-on: ubuntu-latest
    needs: 
      - compile
      - dependency-audit
      - dockerfile-lint
      - gitleaks-scan
      - trivy-fs-scan
      - owasp-dependency-check
      - docker-build-push
      - trivy-image-scan
      - grype-image-scan
    if: always()

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Download npm audit report
        uses: actions/download-artifact@v4
        with:
          name: npm-audit-report
          path: raw-reports/npm-audit
        continue-on-error: true

      - name: Download Gitleaks report
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
          path: raw-reports/gitleaks
        continue-on-error: true

      - name: Download Hadolint Report
        uses: actions/download-artifact@v4
        with:
          name: hadolint-report
          path: raw-reports/hadolint
        continue-on-error: true

      - name: Download Trivy FS Report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: raw-reports/trivy-fs
        continue-on-error: true

      - name: Download OWASP Report
        uses: actions/download-artifact@v4
        with:
          name: owasp-dependency-report
          path: raw-reports/owasp
        continue-on-error: true

      - name: Download Trivy Image Report
        uses: actions/download-artifact@v4
        with:
          name: trivy-image-report
          path: raw-reports/trivy-image
        continue-on-error: true

      - name: Download Grype Image Report
        uses: actions/download-artifact@v4
        with:
          name: grype-image-report
          path: raw-reports/grype-image
        continue-on-error: true
        
      - name: Convert Reports to Allure Results
        run: |
          mkdir -p allure-results

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          BRANCH="${{ github.ref_name }}"
          RUN_NUMBER="${{ github.run_number }}"
          NPM_HTML_URL="${BASE_URL}/scan-reports/${BRANCH}/${RUN_NUMBER}/npm-audit-report.html"
          GITLEAKS_HTML_URL="${BASE_URL}/scan-reports/${BRANCH}/${RUN_NUMBER}/gitleaks-report.html"
          HADOLINT_HTML_URL="${BASE_URL}/scan-reports/${BRANCH}/${RUN_NUMBER}/hadolint-report.html"
          TRIVY_FS_HTML_URL="${BASE_URL}/scan-reports/${BRANCH}/${RUN_NUMBER}/trivy-fs-report.html"
          TRIVY_IMG_HTML_URL="${BASE_URL}/scan-reports/${BRANCH}/${RUN_NUMBER}/trivy-image-report.html"
          GRYPE_HTML_URL="${BASE_URL}/scan-reports/${BRANCH}/${RUN_NUMBER}/grype-image-report.html"
          OWASP_HTML_URL="${BASE_URL}/owasp/${BRANCH}/${RUN_NUMBER}/dependency-check-report.html"

          cat > allure-results/environment.properties <<EOF
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Repository=${{ github.repository }}
          Workflow=${{ github.workflow }}
          Run_Number=${{ github.run_number }}
          Actor=${{ github.actor }}
          EOF

          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "buildOrder": ${{ github.run_number }},
            "buildName": "${{ github.ref_name }} #${{ github.run_number }}",
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.ref_name }}/",
            "reportName": "Security Report - ${{ github.ref_name }} - ${{ github.sha }}"
          }
          EOF

          # ── NPM Audit ──────────────────────────────────────────────────
          NPM_FILE="raw-reports/npm-audit/npm-audit-report.json"
          if [ -f "$NPM_FILE" ] && [ -s "$NPM_FILE" ]; then
            VULN_COUNT=$(jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical' "$NPM_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              STATUS="passed"
              DETAIL="No high or critical vulnerabilities found in npm dependencies."
            else
              STATUS="failed"
              DETAIL=$(jq -r '.advisories? // {} | to_entries[] | "[\(.value.severity | ascii_upcase)] \(.value.module_name) → \(.value.title)"' "$NPM_FILE" 2>/dev/null | head -20)
            fi
          else
            STATUS="skipped"; DETAIL="npm audit report not available."
          fi
          cat > allure-results/npm-audit-result.json <<EOF
          {
            "name": "Dependency Audit (npm audit)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "npm audit scan for known vulnerabilities in project dependencies.",
            "links": [{ "name": "Full npm Audit HTML Report", "url": "${NPM_HTML_URL}", "type": "tms" }],
            "steps": [{ "name": "High/Critical Vulnerabilities", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "Dependency Audit" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Gitleaks ───────────────────────────────────────────────────
          GITLEAKS_FILE="raw-reports/gitleaks/gitleaks-report.json"
          if [ -f "$GITLEAKS_FILE" ] && [ -s "$GITLEAKS_FILE" ]; then
            COUNT=$(jq 'length' "$GITLEAKS_FILE" 2>/dev/null || echo 0)
            if [ "$COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No secrets detected."
            else
              STATUS="failed"
              DETAIL=$(jq -r '.[] | "[\(.RuleID)] \(.Description) in \(.File):\(.StartLine)"' "$GITLEAKS_FILE" | head -20)
            fi
          else
            STATUS="skipped"; DETAIL="Gitleaks report not available."
          fi
          cat > allure-results/gitleaks-result.json <<EOF
          {
            "name": "Secret Scanning (Gitleaks)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Scan for hardcoded secrets and credentials in the repository.",
            "links": [{ "name": "Full Gitleaks Secret Scan HTML Report", "url": "${GITLEAKS_HTML_URL}", "type": "tms" }],
            "steps": [{ "name": "Detected Secrets", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "Secret Scanning" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Hadolint ───────────────────────────────────────────────────
          HADOLINT_FILE="raw-reports/hadolint/hadolint-report.json"
          if [ -f "$HADOLINT_FILE" ] && [ -s "$HADOLINT_FILE" ]; then
            COUNT=$(jq 'length' "$HADOLINT_FILE")
            if [ "$COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No Dockerfile issues found."
            else
              STATUS="failed"
              DETAIL=$(jq -r '[.[] | "[\(.level | ascii_upcase)] \(.code): \(.message) (line \(.line))"] | join("\n")' "$HADOLINT_FILE")
            fi
          else
            STATUS="skipped"; DETAIL="Hadolint report not available."
          fi
          cat > allure-results/hadolint-result.json <<EOF
          {
            "name": "Dockerfile Lint (Hadolint)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Hadolint static analysis of the project Dockerfile.",
            "links": [{ "name": "Full Hadolint Dockerfile Lint HTML Report", "url": "${HADOLINT_HTML_URL}", "type": "tms" }],
            "steps": [{ "name": "Hadolint Findings", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "Dockerfile Lint" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Trivy FS ───────────────────────────────────────────────────
          TRIVY_FS_FILE="raw-reports/trivy-fs/trivy-report.json"
          if [ -f "$TRIVY_FS_FILE" ] && [ -s "$TRIVY_FS_FILE" ]; then
            VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' "$TRIVY_FS_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No HIGH/CRITICAL filesystem vulnerabilities found."
            else
              STATUS="failed"
              DETAIL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL") | "[\(.Severity)] \(.VulnerabilityID) in \(.PkgName) \(.InstalledVersion) → \(.Title // "N/A")"] | unique | join("\n")' "$TRIVY_FS_FILE")
            fi
          else
            STATUS="skipped"; DETAIL="Trivy FS report not available."
          fi
          cat > allure-results/trivy-fs-result.json <<EOF
          {
            "name": "Filesystem Vulnerability Scan (Trivy)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Trivy scan of the repository filesystem for HIGH and CRITICAL CVEs.",
            "links": [{ "name": "Full Trivy Filesystem Scan HTML Report", "url": "${TRIVY_FS_HTML_URL}", "type": "tms" }],
            "steps": [{ "name": "HIGH/CRITICAL CVEs Found", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "Filesystem Vulnerability Scan" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Trivy Image ────────────────────────────────────────────────
          TRIVY_IMG_FILE="raw-reports/trivy-image/trivy-image-report.json"
          if [ -f "$TRIVY_IMG_FILE" ] && [ -s "$TRIVY_IMG_FILE" ]; then
            VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' "$TRIVY_IMG_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No HIGH/CRITICAL image vulnerabilities found."
            else
              STATUS="failed"
              DETAIL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL") | "[\(.Severity)] \(.VulnerabilityID) in \(.PkgName) \(.InstalledVersion) → \(.Title // "N/A")"] | unique | join("\n")' "$TRIVY_IMG_FILE")
            fi
          else
            STATUS="skipped"; DETAIL="Trivy image report not available."
          fi
          cat > allure-results/trivy-image-result.json <<EOF
          {
            "name": "Docker Image Vulnerability Scan (Trivy)",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Trivy scan of the built Docker image for HIGH and CRITICAL CVEs.",
            "links": [{ "name": "Full Trivy Docker Image Scan HTML Report", "url": "${TRIVY_IMG_HTML_URL}", "type": "tms" }],
            "steps": [{ "name": "HIGH/CRITICAL CVEs in Image", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
              { "name": "parentSuite", "value": "${{ github.ref_name }}" },
              { "name": "suite", "value": "Security Scans" },
              { "name": "subSuite", "value": "${SHORT_SHA}" },
              { "name": "feature", "value": "Docker Image Vulnerability Scan" },
              { "name": "severity", "value": "critical" }
            ]
          }
          EOF

          # ── Grype Image Scan ───────────────────────────────────────────
          GRYPE_FILE="raw-reports/grype-image/grype-image-report.json"
          if [ -f "$GRYPE_FILE" ] && [ -s "$GRYPE_FILE" ]; then
            VULN_COUNT=$(jq '[.matches[]? | select(.vulnerability.severity=="High" or .vulnerability.severity=="Critical")] | length' "$GRYPE_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -eq 0 ]; then
              STATUS="passed"; DETAIL="No HIGH/CRITICAL image vulnerabilities found by Grype."
            else
              STATUS="failed"
              DETAIL=$(jq -r '[.matches[]? | select(.vulnerability.severity=="High" or .vulnerability.severity=="Critical") | "[\(.vulnerability.severity | ascii_upcase)] \(.vulnerability.id) in \(.artifact.name) \(.artifact.version) — \(.vulnerability.description // "N/A" | .[0:100])"] | unique | join("\n")' "$GRYPE_FILE" 2>/dev/null || echo "$VULN_COUNT vulnerabilities found.")
            fi
          else
            STATUS="skipped"; DETAIL="Grype image report not available."
          fi
          cat > allure-results/grype-image-result.json <<EOF
          {
            "name": "Grype Docker Image Vulnerability Scan",
            "status": "$STATUS",
            "stage": "finished",
            "description": "Grype scan of the built Docker image for HIGH and CRITICAL CVEs.",
            "links": [{ "name": "Full Grype Image Scan HTML Report", "url": "${GRYPE_HTML_URL}", "type": "tms" }],
            "steps": [{ "name": "HIGH/CRITICAL CVEs in Image", "status": "$STATUS", "stage": "finished", "statusDetails": { "message": $(echo "$DETAIL" | jq -Rs .) } }],
            "labels": [
