# ============================================================
# Shared-CI.yml  —  Orchestrator
# ============================================================
# This is the ONLY file that every service's ci.yml calls:
#
#   uses: <org>/<central-repo>/.github/workflows/Shared-CI.yml@main
#
# It does NO work itself. It delegates every stage to a
# focused reusable workflow and wires their outputs together.
#
# Flow:
#
#   ci-security-scans.yml   ← compile + all pre-build scans
#          │
#          ▼
#   ci-docker.yml           ← build → image scan → gate → push
#          │
#     ┌────┴────┐
#     ▼         ▼
#  ci-sign    ci-report     ← sign/verify run in parallel with report
#     │
#     ▼
#  ci-update-manifest       ← only runs after sign+verify succeed
# ============================================================

name: Shared CI

on:
  workflow_call:

jobs:

  # ── Stage 1: All pre-build security scans ──────────────────
  # Outputs: allow_push (bool string) forwarded from the
  # security-gate job inside ci-docker.yml — but scans must
  # complete first so docker knows what to do.
  security-scans:
    uses: ./.github/workflows/ci-security-scans.yml
    secrets: inherit

  # ── Stage 2: Build → Image Scan → Security Gate → Push ────
  # Needs all scans to pass before it starts.
  # Exposes: image, tag, digest, allow_push as workflow outputs.
  docker:
    needs: security-scans
    uses: ./.github/workflows/ci-docker.yml
    secrets: inherit

  # ── Stage 3a: Sign & Verify (only if image was pushed) ────
  # Receives image/tag/digest from docker stage.
  # If allow_push was false, docker-push was skipped, so
  # digest will be empty and this job's `if:` guard stops it.
  sign:
    needs: docker
    if: needs.docker.outputs.allow_push == 'true'
    uses: ./.github/workflows/ci-sign.yml
    secrets: inherit
    with:
      image:  ${{ needs.docker.outputs.image }}
      tag:    ${{ needs.docker.outputs.tag }}
      digest: ${{ needs.docker.outputs.digest }}

  # ── Stage 3b: Reports (always runs, even on scan failures) ─
  # Runs in parallel with sign so it does not block reporting
  # when the image was rejected by the security gate.
  report:
    needs: [security-scans, docker]
    if: always()
    uses: ./.github/workflows/ci-report.yml
    secrets: inherit

  # ── Stage 4: Update deployment manifest ───────────────────
  # Only runs after the image is signed AND independently
  # verified. This is the final trust gate: only a
  # cryptographically signed + verified image is ever written
  # into the GitOps deployment manifest.
  update-manifest:
    needs: [docker, sign]
    if: needs.docker.outputs.allow_push == 'true'
    uses: ./.github/workflows/ci-update-manifest.yml
    secrets: inherit
    with:
      image:  ${{ needs.docker.outputs.image }}
      tag:    ${{ needs.docker.outputs.tag }}
      digest: ${{ needs.docker.outputs.digest }}
