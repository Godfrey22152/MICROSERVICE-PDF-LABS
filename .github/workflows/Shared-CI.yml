name: Shared CI

on:
  workflow_call:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          
      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          for file in $(find . -name "*.js" -not -path "*/node_modules/*"); do
            echo "Checking $file"
            node --check "$file"
          done
          
  gitleaks-scan:
    runs-on: ubuntu-latest
    needs: compile
    steps: 
    
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: GitLeaks Setup
        uses: gitleaks/gitleaks-action@v2
        
      - name: Run GitLeaks Scan
        run: gitleaks detect --source . --exit-code 1
